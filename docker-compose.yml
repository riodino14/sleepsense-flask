version: "3.9"

services:
  sleepsense-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sleepsense-api
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - PORT=5000
      - TF_CPP_MIN_LOG_LEVEL=2
    volumes:
      # Mount models folder agar bisa update model tanpa rebuild image
      - ./models:/sleepsense/models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  default:
    name: sleepsense-network
